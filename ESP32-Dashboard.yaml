# yaml code customize ESP32-2432S028 into a mini Home Assistant dashboard
# =======================================================================
# Sources of information:
#   Aaron Stewart @makeitworktech, with the help of ChatGPT.
#   GitHub: https://github.com/makeitworktech
#
#   Vaclav Chaloupka
#   https://www.youtube.com/watch?v=8TuYq-6c5ok

# ============================================================
# General ESPHome Setup
# ============================================================

substitutions: 
  font_directory: fonts/
  width: 320
  height: 240
  device_name: esp32-office-dashboard
  nice_name: "ESP32-2432S028 Office Dashboard"

# ESPHome naming
esphome:
  name: ${device_name} # Device hostname
  friendly_name: ${nice_name} # Friendly name shown in Home Assistant
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 40000000L
    board_build.f_cpu: 240000000L
    board_build.flash_size: 4MB
    upload_speed: 921600
    build_unflags:
      - "-Werror=all"

# The ESP32-2432S028 uses a standard ESP32-WROVER, so we use esp32dev
esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: "n"
      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_ESP32_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32_DEFAULT_CPU_FREQ_MHZ: "240"
      CONFIG_ESP32_DISABLE_ROM_LOG: "y"
      CONFIG_LOG_DEFAULT_LEVEL: "3"
      CONFIG_SPI_MASTER_IN_IRAM: "y"
      CONFIG_SPI_SLAVE_IN_IRAM: "y"
      CONFIG_ESP32_REV_MIN_1: "y"
      CONFIG_ESP32_REV_MIN_FULL: "y"

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

# Set OTA password, enables updates via ESPHome
ota:
  platform: esphome
  password: !secret ota_password

# Setup WiFi credentials, references the WiFi SSID and password in secrets.yaml
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: $device_name Hotspot
    password: !secret ap_password

# Allows captive portal access when in fallback mode
captive_portal:

# ============================================================
# ESPHome Display related setup
# ============================================================
# Create a font to use, add and remove glyphs as needed.
font:
  - file:
      path: ${font_directory}Arimo-Regular.ttf # Path to main font file
      type: local
    id: arimo_small
    size: 10
  - file:
      path: ${font_directory}Arimo-Regular.ttf # Path to main font file
      type: local
    id: arimo_large
    size: 20
  - file:
      path: ${font_directory}materialdesignicons-webfont.ttf # Defining Material Design Icons as a font.
      type: local                                            # This allows them to be used as button icons. 
    id: mdi_icons 
    size: 38          # You can get these glyphs from the https://pictogrammers.com/library/mdi/
    glyphs:           # where you choose the icon, and then "copy glyph".
      - 󰐸 # mdi-radiator
      - 󰫘 # mdi-radiator-off
      - 󱞛 # mdi-light-recessed
      - 󰌵 # mdi-lightbulb
      - 󰹏 # mdi-lightbulb-off
      - 󰖠 # mdi-webcam
      - 󰳃 # mdi-seat
      - 󰙍 # human-male
      -  # space
#
# Defines the colors we want to use later for the different buttons.
# Per-button customizable colors
color:
  - id: default_button_bg_color
    hex: "000000" # Black
  - id: default_button_pressed_bg_color
    hex: "E0E0E0" # Very Light Grey

# ============================================================
# Home Assistant related setup
# ============================================================

# ==== Lights Switches in Home Aasistant ====
light:
  # LCD backlight
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
  # onboard rgb led
  - platform: rgb
    name: "Front LED"
    id: front_led
    restore_mode: ALWAYS_OFF
    red: led_red
    green: led_green
    blue: led_blue

# ==== Button Sensors in Home Assistant ====
binary_sensor:
  - platform: template
    name: "Office Heater"
    id: button_1_pressed
  - platform: template
    name: "Webcam Ring Light"
    id: button_2_pressed
  - platform: template
    name: "Office Lights"
    id: button_3_pressed
  - platform: template
    name: "Preset 1 - AI Tracking"
    id: button_4_pressed
  - platform: template
    name: "Preset 2 - Sitting"
    id: button_5_pressed
  - platform: template
    name: "Preset 3 - Standing"
    id: button_6_pressed

# These sensors mirror the state of Home Assistant entities on boot,
# or whenever the entity's state changes.
text_sensor:
  - platform: homeassistant
    id: office_heater
    entity_id: switch.office_heater
    on_value:
      then:
        - lvgl.widget.update:
            id: btn_1
            state:
              checked: !lambda return (0 == x.compare(std::string{"on"}));
              disabled: !lambda return ((0 == x.compare(std::string{"unavailable"})) or (0 == x.compare(std::string{"unknown"})));
        - lvgl.label.update:
            id: lbl_btn_1
            text: !lambda |-
              static char buf[10];
              std::string icon;
              if (0 == x.compare(std::string{"on"})) {
                  icon = "󰐸";  // mdi:radiator
              } else {
                  icon = "󰫘";  // mdi:radiator-off
              }
              snprintf(buf, sizeof(buf), "%s", icon.c_str());
              return buf;
            text_color: !lambda |-
              if (0 == x.compare(std::string{"on"})) {
                  return lv_color_hex(0xFF7F00);  // orange
              } else {
                  return lv_color_hex(0xC0C0C0);  // grey
              }

  - platform: homeassistant
    id: webcam_ring_light
    entity_id: switch.office_laptop_ring_light
    on_value:
      then:
        - lvgl.widget.update:
            id: btn_2
            state:
              checked: !lambda return (0 == x.compare(std::string{"on"}));
              disabled: !lambda return ((0 == x.compare(std::string{"unavailable"})) or (0 == x.compare(std::string{"unknown"})));
        - lvgl.label.update:
            id: lbl_btn_2
            text: !lambda |-
              static char buf[10];
              std::string icon;
              if (0 == x.compare(std::string{"on"})) {
                  icon = "󰌵";  // mdi:lightbulb
              } else {
                  icon = "󰹏";  // mdi:lightbulb-off
              }
              snprintf(buf, sizeof(buf), "%s", icon.c_str());
              return buf;
            text_color: !lambda |-
              if (0 == x.compare(std::string{"on"})) {
                  return lv_color_hex(0xFF7F00);  // orange
              } else {
                  return lv_color_hex(0xC0C0C0);  // grey
              }

  - platform: homeassistant
    id: office_overhead_lights
    entity_id: light.office_main_lights
    on_value:
      then:
        - lvgl.widget.update:
            id: btn_3
            state:
              checked: !lambda return (0 == x.compare(std::string{"on"}));
              disabled: !lambda return ((0 == x.compare(std::string{"unavailable"})) or (0 == x.compare(std::string{"unknown"})));
        - lvgl.label.update:
            id: lbl_btn_3
            text: !lambda |-
              static char buf[10];
              std::string icon;
              if (0 == x.compare(std::string{"on"})) {
                  icon = "󱞛";  // mdi:light-recessed
              } else {
                  icon = "󱞛";  // mdi:light-recessed
              }
              snprintf(buf, sizeof(buf), "%s", icon.c_str());
              return buf;
            text_color: !lambda |-
              if (0 == x.compare(std::string{"on"})) {
                  return lv_color_hex(0xFF7F00);  // orange
              } else {
                  return lv_color_hex(0xC0C0C0);  // grey
              }

# ============================================================
# Touchscreen Display related setup
# ============================================================

# SPI bus for TFT display and touch controller
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# Set a pin to control the backlight
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
    frequency: 1000 Hz
    inverted: false
  - platform: ledc
    pin: GPIO04
    id: led_red
    inverted: true
  - platform: ledc
    pin: GPIO17
    id: led_blue
    inverted: true
  - platform: ledc
    pin: GPIO16
    id: led_green
    inverted: true

# Tracks if recent touch occurred
globals:
  - id: recent_touch
    type: bool
    restore_value: no
    initial_value: "true"

# Defining the touchscreen
touchscreen:
  platform: xpt2046
  spi_id: touch
  cs_pin: GPIO33
  interrupt_pin: GPIO36
  update_interval: 50ms
  threshold: 400
  calibration:
    x_min: 360
    x_max: 3860
    y_min: 280
    y_max: 3860
  transform:
    swap_xy: true
    mirror_x: true
    mirror_y: true
  on_touch:
    then:
      - light.turn_on: backlight
      - lambda: |-
          id(recent_touch) = true;

# Defining the display type and properties
display:
  - platform: ili9xxx
    color_palette: 8BIT
    model: ILI9341
    spi_id: tft
    cs_pin:
      number: GPIO15
      ignore_strapping_warning: true
    dc_pin:
      number: GPIO2
      ignore_strapping_warning: true
    invert_colors: false
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true
    dimensions:
      width: 320
      height: 240
    update_interval: 50ms

# Defining the buttons layout and formatting using LVGL
# Layout is a top header line with text and 
# two rows with three buttons in each row.
# Rows and buttons are evenly spaced.
lvgl:
  buffer_size: 25%
  theme:
    button:
      # This base is overridden by each button's bg_color
      bg_color: 0x000000
      bg_opa: COVER
      border_color: 0xFFFFFF # white border
      border_width: 1
      text_color: 0xFFFFFF # white text by default
      pressed:
        # Light grey for pressed state (used uniformly)
        bg_color: 0xC0C0C0
        bg_grad_color: 0xC0C0C0
        bg_opa: COVER
      checked:
        bg_color: 0x000000
        bg_grad_color: 0x000000
        bg_opa: 45%
  pages:
    - id: main_page
      bg_color: 0x330066
      widgets:
        - obj:
            align: CENTER
            width: 320
            height: 240
            pad_top: 5
            pad_left: 0
            pad_right: 0
            pad_bottom: 0
            bg_color: 0x330066
            bg_opa: COVER
            border_opa: TRANSP
            layout:
              type: GRID
              grid_columns: [FR(1), FR(1), FR(1)]
              grid_rows: [FR(16), FR(42), FR(42)]
              pad_row: 2
              pad_column: 2
            widgets:
              - label:
                  text: "Talk Softly"
                  text_font: arimo_large
                  text_color: 0xFFFFFF
                  text_align: CENTER
                  align: CENTER
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 0
                  grid_cell_column_span: 3
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH

              - button:                     # Button 1 toggles a space heater
                  id: btn_1
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  bg_color: default_button_bg_color
                  bg_opa: 45%
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        id: lbl_btn_1
                        text: "󰐸"
                        text_font: mdi_icons
                        text_color: 0xFF7F00
                        align: CENTER
                    - label:
                        text: "Heater/Fan"
                        text_font: arimo_small
                        text_color: 0xFFFFFF
                        align: BOTTOM_MID
                  on_click:
                    then:
                      - homeassistant.action:
                          action: switch.toggle
                          data:
                            entity_id: switch.office_heater
                      - binary_sensor.template.publish:
                          id: button_1_pressed
                          state: ON
                      - delay: 500ms
                      - binary_sensor.template.publish:
                          id: button_1_pressed
                          state: OFF

              - button:                     # Button 2 toggles webcam ring light
                  id: btn_2
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  bg_color: default_button_bg_color
                  bg_opa: 45%
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        id: lbl_btn_2
                        text: "󰌵"
                        text_font: mdi_icons
                        text_color: 0xFF7F00
                        align: CENTER
                    - label:
                        text: "Webcam Light"
                        text_font: arimo_small
                        text_color: 0xFFFFFF
                        align: BOTTOM_MID
                  on_click:
                    then:
                      - homeassistant.action:
                          action: switch.toggle
                          data:
                            entity_id: switch.office_laptop_ring_light
                      - binary_sensor.template.publish:
                          id: button_2_pressed
                          state: ON
                      - delay: 500ms
                      - binary_sensor.template.publish:
                          id: button_2_pressed
                          state: OFF

              - button:                     # Button 3 toggles the lights in the office
                  id: btn_3
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  bg_opa: 45%
                  checkable: true
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        id: lbl_btn_3
                        text: "󱞛"
                        text_font: mdi_icons
                        text_color: 0xFF7F00
                        align: CENTER
                    - label:
                        text: "Main Lights"
                        text_font: arimo_small
                        text_color: 0xFFFFFF
                        align: BOTTOM_MID
                  on_click:
                    then:
                      - homeassistant.action:
                          action: light.toggle
                          data:
                            entity_id: light.office_main_lights
                      - binary_sensor.template.publish:
                          id: button_3_pressed
                          state: ON
                      - delay: 500ms
                      - binary_sensor.template.publish:
                          id: button_3_pressed
                          state: OFF

              - button:                     # Button 4 activates preset 1 on my webcam
                  id: btn_4
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  bg_opa: 45%
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        id: lbl_btn_4
                        text: "󰖠"
                        text_font: mdi_icons
                        text_color: 0xFF7F00
                        align: CENTER
                    - label:
                        text: "AI Track"
                        text_font: arimo_small
                        text_color: 0xFFFFFF
                        align: BOTTOM_MID
                  on_click:
                    then:
                      - homeassistant.action:
                          action: script.turn_on
                          data:
                            entity_id: script.trigger_obsbot_preset_1
                      - binary_sensor.template.publish:
                          id: button_4_pressed
                          state: ON
                      - delay: 500ms
                      - binary_sensor.template.publish:
                          id: button_4_pressed
                          state: OFF
              - button:                     # Button 5 activates preset 1 on my webcam
                  id: btn_5
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  bg_opa: 45%
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        id: lbl_btn_5
                        text: "󰖠󰳃"
                        text_font: mdi_icons
                        text_color: 0xFF7F00
                        align: CENTER
                    - label:
                        text: "Sitting"
                        text_font: arimo_small
                        text_color: 0xFFFFFF
                        align: BOTTOM_MID
                  on_click:
                    then:
                      - homeassistant.action:
                          action: script.turn_on
                          data:
                            entity_id: script.trigger_obsbot_preset_2
                      - binary_sensor.template.publish:
                          id: button_5_pressed
                          state: ON
                      - delay: 500ms
                      - binary_sensor.template.publish:
                          id: button_5_pressed
                          state: OFF
              - button:                     # Button 6 activates preset 1 on my webcam
                  id: btn_6
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  bg_opa: 45%
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        id: lbl_btn_6
                        text: "󰖠󰙍"
                        text_font: mdi_icons
                        text_color: 0xFF7F00
                        align: CENTER
                    - label:
                        text: "Standing"
                        text_font: arimo_small
                        text_color: 0xFFFFFF
                        align: BOTTOM_MID
                  on_click:
                    then:
                      - homeassistant.action:
                          action: script.turn_on
                          data:
                            entity_id: script.trigger_obsbot_preset_3
                      - binary_sensor.template.publish:
                          id: button_6_pressed
                          state: ON
                      - delay: 500ms
                      - binary_sensor.template.publish:
                          id: button_6_pressed
                          state: OFF
